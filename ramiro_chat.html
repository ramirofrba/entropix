<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista Virtual: Ramiro Ferrero | Entropix SRL</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuración de Identidad y API
        const API_KEY = "AIzaSyCnTt41-bPPuq55k468ZEkwpTpWwO5MYiY"; 
        const NOMBRE_GERENTE = "Ing. Ramiro Ferrero";
        const PUESTO_GERENTE = "Director General";
        const FOTO_ARCHIVO = "ramiro_ferrero.png";
        const MODEL_NAME = "gemini-1.5-flash";

        const SYSTEM_PROMPT = `
        Actúa como el Ing. Ramiro Ferrero, Director General (CEO) de Entropix SRL.
        Tu interlocutor es un Analista de Sistemas Senior que está realizando un relevamiento estratégico.

        REGLA CRÍTICA DE FORMATO:
        - NO utilices formato Markdown. 
        - NUNCA uses asteriscos (*) para negritas ni numerales (#) para títulos.
        - Respondé exclusivamente en texto plano profesional. Usá saltos de línea para separar párrafos.

        PERSONALIDAD Y TONO:
        - Eres visionario, ejecutivo y directo. Hablás con voseo argentino profesional (Mirá, Te cuento, Como analista entenderás).
        - No entras en el detalle técnico de cómo funciona un servidor, sino en PARA QUÉ sirve al negocio.

        CONTEXTO ESTRATÉGICO:
        1. Ley de Economía del Conocimiento (LEC): Es nuestra prioridad #1.
        2. Calidad como Pasaporte: Sin las certificaciones ISO, perdemos los beneficios de la Ley.
        3. Expectativa sobre el Analista: Necesitás que el relevamiento sea impecable para asegurar la revalidación bienal.
        `;

        function App() {
            const [messages, setMessages] = useState([
                { role: 'assistant', text: 'Buen día. Soy Ramiro Ferrero. Me parece excelente que se hayan sumado para analizar nuestros procesos de cara a la revalidación del Régimen LEC. ¿En qué puedo ayudarlos desde la Dirección General?' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(scrollToBottom, [messages]);

            const callGemini = async (userText) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ text: `INSTRUCCIÓN DE SISTEMA: ${SYSTEM_PROMPT}\n\nHistorial:\n${messages.map(m => m.role + ": " + m.text).join("\n")}\nAnalista: ${userText}` }] 
                            }]
                        })
                    });

                    const data = await response.json();

                    // Verificación de errores de la API
                    if (!response.ok) {
                        return `Error del servidor (${response.status}): ${data.error?.message || 'Error desconocido'}. Verificá tu clave de API en Google AI Studio.`;
                    }

                    if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
                        return data.candidates[0].content.parts[0].text;
                    } else {
                        return "La Dirección no pudo generar una respuesta clara en este momento. Por favor, revisá los filtros de seguridad de la API.";
                    }
                } catch (e) {
                    return "Error de red: No se pudo conectar con el servicio de IA. Verificá tu conexión o si la API Key tiene restricciones de IP/Dominio.";
                }
            };

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                const userMsg = input;
                setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setIsLoading(true);

                const botRes = await callGemini(userMsg);
                setMessages(prev => [...prev, { role: 'assistant', text: botRes }]);
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen max-h-screen overflow-hidden bg-slate-100">
                    <header className="bg-slate-900 text-white p-4 shadow-2xl flex items-center justify-between border-b border-slate-700 shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 rounded-xl overflow-hidden border-2 border-slate-500 bg-white">
                                <img 
                                    src={FOTO_ARCHIVO} 
                                    alt={NOMBRE_GERENTE} 
                                    className="w-full h-full object-cover" 
                                    onError={(e) => e.target.src = "https://ui-avatars.com/api/?name=Ramiro+Ferrero&background=0f172a&color=fff"}
                                />
                            </div>
                            <div>
                                <h1 className="font-bold text-xl tracking-tight leading-none">{NOMBRE_GERENTE}</h1>
                                <p className="text-[10px] text-blue-400 uppercase font-extrabold tracking-widest mt-1.5">{PUESTO_GERENTE}</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 md:p-10 no-scrollbar">
                        <div className="max-w-4xl mx-auto space-y-6">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'assistant' ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`flex gap-4 max-w-[85%] ${m.role === 'assistant' ? 'flex-row' : 'flex-row-reverse'}`}>
                                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center shrink-0 shadow-md ${m.role === 'assistant' ? 'bg-white' : 'bg-blue-700'}`}>
                                            {m.role === 'assistant' ? (
                                                <img src={FOTO_ARCHIVO} className="w-full h-full object-cover rounded-lg" onError={(e) => e.target.style.display='none'} />
                                            ) : (
                                                <span className="text-white font-bold text-sm">AN</span>
                                            )}
                                        </div>
                                        <div className={`p-5 rounded-2xl shadow-sm border ${
                                            m.role === 'assistant' 
                                            ? 'bg-white border-slate-200 text-slate-800 rounded-tl-none' 
                                            : 'bg-blue-700 border-blue-600 text-white rounded-tr-none'
                                        }`}>
                                            <p className="text-sm md:text-base whitespace-pre-wrap leading-relaxed font-medium">{m.text}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {isLoading && (
                                <div className="flex justify-start">
                                    <div className="bg-white border border-slate-200 px-5 py-4 rounded-xl shadow-sm text-[10px] font-bold text-slate-400 animate-pulse uppercase tracking-widest ml-14">
                                        Analizando impacto estratégico...
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>
                    </main>

                    <footer className="p-4 md:p-6 bg-white border-t border-slate-200">
                        <div className="max-w-4xl mx-auto flex gap-3">
                            <input 
                                className="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-5 py-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="Escribí tu consulta técnica para Ramiro..."
                                disabled={isLoading}
                            />
                            <button 
                                onClick={handleSend} 
                                disabled={isLoading || !input.trim()}
                                className="bg-slate-900 text-white px-8 py-2 rounded-xl font-bold hover:bg-black disabled:opacity-50 transition-all shadow-lg text-sm"
                            >
                                Enviar
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
