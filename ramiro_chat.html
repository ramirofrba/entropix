<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista: Juan Martín Álvarez | Entropix</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; } .no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_KEY = "AIzaSyBtw2DQV6B9IJtM1dQ8T01-9cE2HKTYxYQ"; 
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent";

        const SYSTEM_PROMPT = `Actúa como el Ing. Juan Martín Álvarez, Gerente de Calidad y Procesos de Entropix SRL. Voseo argentino profesional. REGLA CRÍTICA: NO uses Markdown (ni asteriscos ni numerales). Texto plano con saltos de línea. Tu foco es la ISO 9001 y asegurar la trazabilidad para la revalidación del Régimen LEC. Eres extremadamente detallista con las auditorías externas.`;

        function App() {
            const [messages, setMessages] = useState([{ role: 'assistant', text: 'Buen día. Soy Juan Martín Álvarez. Me comentaron que están realizando el relevamiento estratégico para la revalidación del LEC. Desde Calidad, mi prioridad es la integridad del SGC. ¿En qué puedo ayudarlos hoy?' }]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);
            const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            useEffect(scrollToBottom, [messages]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;
                const text = input; setInput('');
                setMessages(prev => [...prev, { role: 'user', text }]);
                setIsLoading(true);
                try {
                    const res = await fetch(`${API_URL}?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `SYSTEM: ${SYSTEM_PROMPT}\nAnalista: ${text}` }] }] })
                    });
                    const data = await res.json();
                    setMessages(prev => [...prev, { role: 'assistant', text: data.candidates[0].content.parts[0].text }]);
                } catch (e) { setMessages(prev => [...prev, { role: 'assistant', text: 'Error de comunicación con el sistema de Calidad.' }]); }
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-blue-900 text-white p-4 flex items-center gap-4 border-b-4 border-blue-500 shadow-lg shrink-0">
                        <img src="juanmartin_alvarez.png" className="w-12 h-12 rounded-lg object-cover bg-white" onError={(e) => e.target.src="https://ui-avatars.com/api/?name=Juan+Martin+Alvarez"} />
                        <div><h1 className="font-bold">Juan Martín Álvarez</h1><p className="text-[10px] text-blue-300 uppercase font-bold tracking-widest">Gerente de Calidad y Procesos</p></div>
                    </header>
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 space-y-4 no-scrollbar bg-slate-50">
                        <div className="max-w-4xl mx-auto space-y-4">
                            {messages.map((m, i) => (
                                <div key={i} className={`flex ${m.role === 'assistant' ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`p-4 rounded-xl max-w-[85%] shadow-sm border ${m.role === 'assistant' ? 'bg-white border-slate-200 text-slate-800' : 'bg-blue-700 border-blue-600 text-white'}`}>
                                        <p className="text-sm whitespace-pre-wrap">{m.text}</p>
                                    </div>
                                </div>
                            ))}
                            {isLoading && <div className="text-[10px] font-bold text-slate-400 animate-pulse uppercase tracking-widest ml-2">Consultando registros ISO...</div>}
                            <div ref={messagesEndRef} />
                        </div>
                    </main>
                    <footer className="p-4 bg-white border-t border-slate-200 shrink-0 shadow-2xl">
                        <div className="max-w-4xl mx-auto flex gap-2">
                            <input className="flex-1 border rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 bg-slate-50 font-medium shadow-inner" value={input} onChange={(e) => setInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSend()} placeholder="Consultar sobre auditorías, ISO o Régimen LEC..." disabled={isLoading}/>
                            <button onClick={handleSend} className="bg-blue-900 text-white px-8 py-2 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all">Enviar</button>
                        </div>
                    </footer>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
